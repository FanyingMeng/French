<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法语艾宾浩斯默写</title>
    <style>
        :root {
            --sb-green: #2ecc71;
            --sb-bg: #f8faf9;
            --sb-text: #333;
            --sb-red: #ff5e57;
            --sb-blue: #3498db;
            --sb-purple: #9b59b6;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--sb-bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #mode-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 24px;
        }

        .mode-btn {
            width: 240px;
            padding: 20px;
            margin: 15px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            color: white;
            transition: .2s;
        }

        .btn-word    { background: var(--sb-green); }
        .btn-verb    { background: var(--sb-blue); }
        .btn-sentence{ background: var(--sb-purple); }

        .mode-btn:hover {
            opacity: .9;
            transform: scale(1.05);
        }

        .card {
            background: white;
            width: 620px;
            max-width: 92vw;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.06);
            text-align: center;
            position: relative;
            min-height: 420px;
            display: flex;
            flex-direction: column;
        }

        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            color: #ddd;
            font-size: 20px;
            z-index: 10;
        }

        .header {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 30px;
        }

        #count {
            color: var(--sb-green);
            font-weight: bold;
        }

        .word-cn {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 40px;
            min-height: 45px;
            cursor: pointer;
            transition: color 0.2s;
        }

        /* 句子模式：中文提示字体小一点，靠右显示，支持换行 */
        .word-cn.sentence-mode {
            font-size: 22px;
            line-height: 1.5;
            min-height: 60px;
            text-align: right;
            white-space: pre-line;
            word-wrap: break-word;
        }

        .gender-m { color: var(--sb-blue) !important; }
        .gender-f { color: var(--sb-red) !important; }

        input {
            border: none;
            border-bottom: 2px solid #eee;
            padding: 10px 0;
            font-size: 26px;
            text-align: center;
            outline: none;
            transition: .3s;
            color: #2c3e50;
            width: 100%;
        }

        input:focus {
            border-bottom-color: var(--sb-green);
        }

        .feedback {
            margin-top: 25px;
            height: 24px;
            font-size: 20px;
            font-weight: 500;
        }

        .success { color: var(--sb-green); }
        .error   { color: var(--sb-red); }

        button.action-btn {
            background: var(--sb-green);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 25px;
            font-size: 16px;
            font-weight: bold;
        }

        /* ── 句子揭示区 ── */
        #sentence-reveal-area {
            display: none;
            margin-top: 10px;
            flex-direction: column;
            align-items: center;
        }

        #sentence-hint {
            font-size: 13px;
            color: #bbb;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        #sentence-answer {
            font-size: 20px;
            color: #2c3e50;
            line-height: 1.6;
            padding: 16px 20px;
            background: #f4f9f4;
            border-radius: 12px;
            width: 100%;
            box-sizing: border-box;
            display: none;
            text-align: right;
            white-space: normal;
            word-wrap: break-word;
        }

        /* 记住了 / 没记住 按钮 */
        .sentence-judge-row {
            display: none;
            gap: 12px;
            margin-top: 18px;
            width: 100%;
        }

        .sentence-judge-row button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: .15s;
        }

        .btn-remembered {
            background: var(--sb-green);
            color: white;
        }

        .btn-forgotten {
            background: #ffe9e9;
            color: var(--sb-red);
        }

        .btn-remembered:hover { opacity: .88; }
        .btn-forgotten:hover  { opacity: .88; }

        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 100;
        }

        .modal-content {
            background: white;
            width: 280px;
            margin: 15% auto;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="modal">
    <div class="modal-content">
        <h3>学习设置</h3>
        <p style="font-size:14px;color:#666">每日计划词数：</p>
        <input type="number" id="limit-input">
        <button class="action-btn" onclick="saveSettings()">保存并刷新</button>
    </div>
</div>

<div class="card">
    <div id="mode-overlay">
        <h2 style="margin-bottom:30px;color:#333;">Bonjour ! <br>请选择学习内容</h2>
        <button class="mode-btn btn-word"     onclick="startApp('word')">📖 普通单词</button>
        <button class="mode-btn btn-verb"     onclick="startApp('verb')">🔄 动词变位</button>
        <button class="mode-btn btn-sentence" onclick="startApp('sentence')">💬 背诵句子</button>
    </div>

    <div class="settings-btn" onclick="openSettings()">⚙️</div>

    <div class="header">待完成: <span id="count">0</span></div>

    <div id="learning-ui" style="display: flex; flex-direction: column;">
        <div class="word-cn" id="display-cn" title="点击听发音">加载中...</div>

        <!-- 普通单词 / 动词变位 输入区 -->
        <div id="word-area">
            <input type="text" id="single-input" placeholder="输入法语拼写"
                   autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>

        <!-- 句子模式 揭示区 -->
        <div id="sentence-reveal-area">
            <div id="sentence-hint">按 Enter 查看答案</div>
            <div id="sentence-answer"></div>
            <div class="sentence-judge-row" id="sentence-judge-row">
                <button class="btn-remembered" id="btn-remembered" onclick="sentenceJudge(true)">✅ 记住了</button>
                <button class="btn-forgotten"  id="btn-forgotten"  onclick="sentenceJudge(false)">❌ 没记住</button>
            </div>
        </div>

        <div class="feedback" id="feedback"></div>

        <div id="finish-area" style="display:none">
            <h3 style="color:var(--sb-green)">打卡成功！🎉</h3>
            <button class="action-btn" onclick="location.reload()">再来一轮</button>
        </div>
    </div>
</div>

<script src="app.js" defer></script>
</body>
</html>
